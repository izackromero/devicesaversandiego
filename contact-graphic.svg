<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" width="300" height="600" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif">
  <defs>
    <clipPath id="screenClip">
      <rect x="16" y="16" width="268" height="568" rx="36"/>
    </clipPath>
    <clipPath id="avatarClip">
      <circle cx="150" cy="190" r="62"/>
    </clipPath>
    <linearGradient id="phoneBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="100%" stop-color="#1a1a1e"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#252528"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <filter id="phoneShadow" x="-15%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Phone drop shadow -->
  <rect x="10" y="10" width="280" height="580" rx="44" fill="url(#phoneBg)" filter="url(#phoneShadow)"/>

  <!-- Phone body -->
  <rect x="4" y="4" width="292" height="592" rx="46" fill="#2c2c2e"/>
  <rect x="6" y="6" width="288" height="588" rx="44" fill="url(#phoneBg)"/>

  <!-- Side buttons -->
  <rect x="0" y="148" width="4" height="38" rx="2" fill="#3a3a3c"/>
  <rect x="0" y="200" width="4" height="62" rx="2" fill="#3a3a3c"/>
  <rect x="0" y="276" width="4" height="62" rx="2" fill="#3a3a3c"/>
  <rect x="296" y="188" width="4" height="84" rx="2" fill="#3a3a3c"/>

  <!-- Screen background -->
  <rect x="16" y="16" width="268" height="568" rx="36" fill="#1c1c1e"/>

  <!-- All screen content clipped to screen shape -->
  <g clip-path="url(#screenClip)">

    <!-- Contact header background -->
    <rect x="16" y="16" width="268" height="310" fill="url(#headerGrad)"/>
    <!-- Page body -->
    <rect x="16" y="326" width="268" height="258" fill="url(#bodyGrad)"/>
    <!-- Divider blur strip -->
    <rect x="16" y="313" width="268" height="18" fill="#252528"/>

    <!-- Dynamic island pill -->
    <rect x="107" y="24" width="86" height="26" rx="13" fill="#000000"/>

    <!-- Status bar: time -->
    <text x="38" y="44" fill="#ffffff" font-size="13" font-weight="600">9:41</text>
    <!-- Battery -->
    <rect x="232" y="34" width="24" height="12" rx="3" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.6"/>
    <rect x="256" y="38" width="3" height="4" rx="1" fill="#ffffff" fill-opacity="0.6"/>
    <rect x="234" y="36" width="17" height="8" rx="1.5" fill="#5dde5d"/>
    <!-- Signal dots -->
    <circle cx="214" cy="40" r="2" fill="#fff" fill-opacity="0.8"/>
    <circle cx="221" cy="40" r="2" fill="#fff" fill-opacity="0.8"/>
    <circle cx="228" cy="40" r="2" fill="#fff" fill-opacity="0.4"/>

    <!-- Nav: back / edit -->
    <text x="28" y="80" fill="#0a84ff" font-size="14">‹</text>
    <text x="36" y="80" fill="#0a84ff" font-size="14">Contacts</text>
    <text x="264" y="80" fill="#0a84ff" font-size="14" text-anchor="end">Edit</text>

    <!-- ── AVATAR CIRCLE ── -->
    <!-- Avatar bg -->
    <circle cx="150" cy="190" r="62" fill="#2c2c2e"/>

    <!-- Phone silhouette inside avatar (cracked screen graphic) -->
    <g clip-path="url(#avatarClip)">
      <!-- Phone body in avatar -->
      <rect x="116" y="130" width="68" height="118" rx="10" fill="#111111" stroke="#444" stroke-width="1.5"/>
      <!-- Screen in avatar -->
      <rect x="122" y="145" width="56" height="90" rx="5" fill="#0a0a0a"/>
      <!-- Notch -->
      <rect x="140" y="133" width="20" height="9" rx="4" fill="#222"/>
      <!-- Home bar -->
      <rect x="137" y="238" width="26" height="4" rx="2" fill="#444"/>

      <!-- ── CRACK SYSTEM ── impact point at (138, 160) upper-left of screen -->

      <!-- Primary radiating cracks -->
      <!-- up-left to corner -->
      <polyline points="138,160 128,148 120,138 116,130" stroke="rgba(255,255,255,0.90)" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- straight up -->
      <polyline points="138,160 136,148 133,139" stroke="rgba(255,255,255,0.80)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- up-right -->
      <polyline points="138,160 150,148 162,138 170,130" stroke="rgba(255,255,255,0.85)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- right toward edge -->
      <polyline points="138,160 153,158 165,155 178,153" stroke="rgba(255,255,255,0.80)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- down-right -->
      <polyline points="138,160 148,172 158,184 165,200 168,218" stroke="rgba(255,255,255,0.75)" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- straight down -->
      <polyline points="138,160 137,175 135,192 133,212 131,232" stroke="rgba(255,255,255,0.70)" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- down-left -->
      <polyline points="138,160 128,172 120,185 118,205" stroke="rgba(255,255,255,0.72)" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- left -->
      <polyline points="138,160 126,158 122,156" stroke="rgba(255,255,255,0.78)" stroke-width="1.4" fill="none" stroke-linecap="round"/>

      <!-- Secondary / branch cracks -->
      <polyline points="150,148 156,140 160,133" stroke="rgba(255,255,255,0.50)" stroke-width="1.0" fill="none" stroke-linecap="round"/>
      <polyline points="128,148 122,144" stroke="rgba(255,255,255,0.45)" stroke-width="1.0" fill="none" stroke-linecap="round"/>
      <polyline points="153,158 158,165 162,172" stroke="rgba(255,255,255,0.45)" stroke-width="1.0" fill="none" stroke-linecap="round"/>
      <polyline points="148,172 152,177 157,175" stroke="rgba(255,255,255,0.38)" stroke-width="0.9" fill="none" stroke-linecap="round"/>
      <polyline points="128,172 122,178 118,185" stroke="rgba(255,255,255,0.40)" stroke-width="0.9" fill="none" stroke-linecap="round"/>

      <!-- Impact star burst at impact point -->
      <circle cx="138" cy="160" r="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      <circle cx="138" cy="160" r="2" fill="rgba(255,255,255,0.6)"/>

      <!-- Shatter glass fragment highlights -->
      <polygon points="138,160 132,152 138,148" fill="rgba(255,255,255,0.12)"/>
      <polygon points="138,160 144,152 150,158" fill="rgba(255,255,255,0.10)"/>
      <polygon points="138,160 132,166 126,162" fill="rgba(255,255,255,0.09)"/>
      <polygon points="138,160 144,167 140,172" fill="rgba(255,255,255,0.08)"/>

      <!-- Subtle screen glare on cracked screen -->
      <rect x="122" y="145" width="56" height="90" rx="5" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </g>

    <!-- Avatar border ring -->
    <circle cx="150" cy="190" r="62" fill="none" stroke="#3a3a3c" stroke-width="2"/>

    <!-- ── CONTACT INFO ── -->

    <!-- Name -->
    <text x="150" y="278" fill="#ffffff" font-size="21" font-weight="600" text-anchor="middle" letter-spacing="-0.5">Device Saver</text>
    <text x="150" y="300" fill="#ffffff" font-size="21" font-weight="600" text-anchor="middle" letter-spacing="-0.5">San Diego</text>

    <!-- Subtitle label -->
    <text x="150" y="318" fill="#8e8e93" font-size="13" text-anchor="middle" letter-spacing="0.2">Mobile Repair · North County SD</text>

    <!-- ── ACTION BUTTONS ── -->
    <g>
      <!-- Message -->
      <g transform="translate(55,355)">
        <circle cx="0" cy="0" r="26" fill="#2c2c2e"/>
        <text x="0" y="6" fill="#0a84ff" font-size="18" text-anchor="middle">✉</text>
        <text x="0" y="24" fill="#8e8e93" font-size="10" text-anchor="middle">message</text>
      </g>
      <!-- Call -->
      <g transform="translate(118,355)">
        <circle cx="0" cy="0" r="26" fill="#2c2c2e"/>
        <text x="0" y="7" fill="#0a84ff" font-size="20" text-anchor="middle">📞</text>
        <text x="0" y="24" fill="#8e8e93" font-size="10" text-anchor="middle">call</text>
      </g>
      <!-- Video -->
      <g transform="translate(181,355)">
        <circle cx="0" cy="0" r="26" fill="#2c2c2e"/>
        <text x="0" y="7" fill="#0a84ff" font-size="18" text-anchor="middle">📹</text>
        <text x="0" y="24" fill="#8e8e93" font-size="10" text-anchor="middle">video</text>
      </g>
      <!-- More -->
      <g transform="translate(244,355)">
        <circle cx="0" cy="0" r="26" fill="#2c2c2e"/>
        <text x="0" y="7" fill="#0a84ff" font-size="24" text-anchor="middle" dy="-2">•••</text>
        <text x="0" y="24" fill="#8e8e93" font-size="10" text-anchor="middle">more</text>
      </g>
    </g>

    <!-- ── INFO ROWS ── -->
    <!-- Phone row -->
    <rect x="24" y="395" width="252" height="52" rx="11" fill="#2c2c2e"/>
    <text x="42" y="415" fill="#8e8e93" font-size="11">mobile</text>
    <text x="42" y="434" fill="#0a84ff" font-size="16">(619) 820-8047</text>
    <text x="262" y="424" fill="#636366" font-size="20" text-anchor="end">›</text>

    <!-- Website row -->
    <rect x="24" y="457" width="252" height="52" rx="11" fill="#2c2c2e"/>
    <text x="42" y="477" fill="#8e8e93" font-size="11">website</text>
    <text x="42" y="496" fill="#0a84ff" font-size="13">devicesaversandiego.com</text>
    <text x="262" y="486" fill="#636366" font-size="20" text-anchor="end">›</text>

    <!-- Hours row -->
    <rect x="24" y="519" width="252" height="40" rx="11" fill="#2c2c2e"/>
    <text x="42" y="532" fill="#8e8e93" font-size="11">hours</text>
    <text x="42" y="548" fill="#ffffff" font-size="13">Open 7 days · 8AM – 8PM</text>

    <!-- Bottom home indicator -->
    <rect x="116" y="570" width="68" height="4" rx="2" fill="#48484a"/>

  </g>

  <!-- Screen edge gloss -->
  <rect x="16" y="16" width="268" height="568" rx="36" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

</svg>
